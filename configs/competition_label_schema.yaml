# Official competition label schema for PCAP-LLM session-level classification.
# This file defines final output codes. Legacy semantic labels are kept only as
# intermediate mapping hints and must not be submitted directly.

task_unit: session
pcap_independence: true
anonymous_entities: true

stage_codes:
  TA43:
    name: reconnaissance
    zh_name: 侦察
  TA01:
    name: initial_access
    zh_name: 初始访问
  TA03:
    name: persistence
    zh_name: 持久化
  TA11:
    name: command_and_control
    zh_name: 命令与控制
  TN01:
    name: normal_browsing_or_business_access
    zh_name: 正常流量 / 上网及业务访问

technique_codes:
  TA43_01:
    parent_stage: TA43
    name: port_scan
    zh_name: 端口扫描
  TA43_02:
    parent_stage: TA43
    name: vulnerability_scan
    zh_name: 漏洞扫描
  TA01_01:
    parent_stage: TA01
    name: password_bruteforce
    zh_name: 密码爆破
  TA01_02:
    parent_stage: TA01
    name: vulnerability_exploitation
    zh_name: 漏洞利用
  TA03_01:
    parent_stage: TA03
    name: implant_backdoor
    zh_name: 植入后门
  TA11_01:
    parent_stage: TA11
    name: access_backdoor
    zh_name: 访问后门
  TA11_02:
    parent_stage: TA11
    name: malware_callback
    zh_name: 木马回连
  TN01_01:
    parent_stage: TN01
    name: normal_browsing_or_business_access
    zh_name: 上网及业务访问

csv_outputs:
  stage1_submission:
    path: outputs/submissions/stage1_submission.csv
    required_fields:
      - pcap_id
      - session_id
      - stage_code
    optional_audit_fields:
      - reason
      - confidence
      - evidence_refs
      - rag_doc_ids
  stage2_submission:
    path: outputs/submissions/stage2_submission.csv
    required_fields:
      - pcap_id
      - session_id
      - technique_code
    optional_audit_fields:
      - reason
      - confidence
      - evidence_refs
      - rag_doc_ids
  report:
    path: outputs/submissions/submission_export_report.md
    note: Reasons are for human inspection and should not be included in final CSV unless the official template allows them.

legacy_semantic_label_mapping:
  normal:
    suggested_stage_code: TN01
    suggested_technique_code: TN01_01
    note: Legacy internal semantic label only.
  port_scan:
    suggested_stage_code: TA43
    suggested_technique_code: TA43_01
    note: Distinguish from vulnerability scanning when scanner behavior targets service/version/CVE checks.
  exploit:
    suggested_stage_code: TA01
    suggested_technique_code: TA01_02
    note: Requires evidence of vulnerability exploitation, not just a generic alert.
  backdoor:
    suggested_stage_code: TA03
    suggested_technique_code: TA03_01
    note: Use TA11_01 instead when the session is access to an already implanted backdoor.
  trojan_callback:
    suggested_stage_code: TA11
    suggested_technique_code: TA11_02
    note: Legacy term for malware callback behavior.
  c2:
    suggested_stage_code: TA11
    suggested_technique_code: TA11_01
    note: Map carefully; C2-like periodic traffic may still be normal without strong evidence.
  other_attack:
    suggested_stage_code: null
    suggested_technique_code: null
    note: Do not submit this label. Reclassify into an official code or fall back by evidence policy.

fallback_rules:
  invalid_stage_code: TN01
  invalid_technique_code: TN01_01
  weak_or_ambiguous_evidence: TN01_01
  missing_required_session_fields: manual_review
  require_warning_in_audit_report: true

metrics:
  primary: macro_f1
  secondary:
    - per_class_f1
    - confusion_matrix
  avoid_optimizing_only:
    - overall_accuracy
    - normal_ratio
