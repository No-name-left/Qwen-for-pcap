# Qwen3.5-27B OpenAI-compatible runtime configuration.
# Secrets must be supplied by environment variables, never by this file.

provider:
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
  model_name_env: LLM_MODEL_NAME

generation:
  temperature: 0.0
  top_p: 0.8
  max_tokens: 8192
  batch_size: 8
  request_timeout_seconds: 180
  enable_thinking: false
  send_extra_body: true

task:
  unit: session
  model_output_field: technique_code
  derived_output_field: stage_code
  final_outputs:
    - outputs/submissions/stage1_submission.csv
    - outputs/submissions/stage2_submission.csv
  audit_report: outputs/submissions/submission_export_report.md

safety:
  no_real_token_in_repo: true
  no_expected_labels_in_prompt: true
  no_mta_answer_pdf_answers_in_prompt: true
  no_cross_pcap_inference: true
