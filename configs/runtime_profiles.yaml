schema_version: 1
default_profile: ascend_openeuler_qwen35_27b

profiles:
  ascend_openeuler_qwen35_27b:
    base_url: http://127.0.0.1:8000/v1
    model: qwen3.5
    api_key_env: LLM_API_KEY
    max_model_len: 4096
    max_prompt_tokens: 3400
    max_prompt_chars: 10200
    max_output_tokens: 384
    max_rag_chunks: 5
    max_rag_chars_per_chunk: 480
    max_session_context_chars: 4200
    enable_thinking: false
    send_extra_body: true
    mock: false
    notes: Conservative budget for two Ascend 910B2 64GB cards and vLLM-Ascend with max-model-len 4096; leaves output and chat-template headroom.

  nvidia_ubuntu_online_api:
    base_url_env: LLM_BASE_URL
    model_env: LLM_MODEL_NAME
    api_key_env: LLM_API_KEY
    max_model_len_env: LLM_MAX_MODEL_LEN
    max_model_len: 8192
    max_prompt_tokens_env: LLM_MAX_PROMPT_TOKENS
    max_prompt_tokens: 6500
    max_prompt_chars_env: LLM_MAX_PROMPT_CHARS
    max_prompt_chars: 19500
    max_output_tokens: 512
    max_rag_chunks: 7
    max_rag_chars_per_chunk: 650
    max_session_context_chars: 6500
    enable_thinking_env: LLM_ENABLE_THINKING
    enable_thinking: false
    send_extra_body: false
    mock: false
    notes: NVIDIA Ubuntu or an online OpenAI-compatible service; endpoint, model and secret stay in environment variables.

  dry_run_mock:
    base_url: mock://local
    model: mock-closedset
    max_model_len: 4096
    max_prompt_tokens: 3400
    max_prompt_chars: 10200
    max_output_tokens: 256
    max_rag_chunks: 5
    max_rag_chars_per_chunk: 480
    max_session_context_chars: 4200
    enable_thinking: false
    send_extra_body: false
    mock: true
    notes: Deterministic local plumbing test; makes no network or model call and is not a quality evaluation.
