schema_version: 1
updated_at: "2026-06-22"
datasets:
  - dataset_id: cic_ids2017
    official_name: CIC-IDS2017
    official_page: https://www.unb.ca/cic/datasets/ids-2017.html
    source_type: mixed
    expected_size: "full PCAP and labeled-flow bundle: multi-GB; exact current package size requires portal confirmation"
    download_method: manual
    priority: P1
    candidate_technique_codes: [TA43_01, TA01_01, TA01_02, TA03_01, TA11_01, TA11_02, TN01_01]
    label_source: official CICFlowMeter labels and published attack schedule
    license_or_terms: review the UNB/CIC dataset terms and citation instructions before redistribution
    safety_notes: traffic data only; do not execute recovered payloads
    download_status: metadata_only
    local_path: datasets/public/cicids2017
    notes: PortScan, Patator, Web Attack, Bot and Benign are useful; Infiltration is not a high-confidence backdoor-stage label.

  - dataset_id: cse_cic_ids2018
    official_name: CSE-CIC-IDS2018 on AWS
    official_page: https://registry.opendata.aws/cse-cic-ids2018/
    source_type: mixed
    expected_size: "AWS full corpus: hundreds of GB; selected processed CSVs currently total about 1.2GB"
    download_method: aws
    priority: P0
    candidate_technique_codes: [TA43_01, TA43_02, TA01_01, TA01_02, TA03_01, TA11_01, TA11_02, TN01_01]
    label_source: official attack schedule and CICFlowMeter Label column
    license_or_terms: AWS Open Data terms plus UNB/CIC citation requirements
    safety_notes: never use aws s3 sync by default; select individual processed files
    download_status: partial_downloaded
    local_path: datasets/public/cse_cic_ids2018
    notes: Existing CSVs are flow-only. Infiltration substage mappings require manual review.

  - dataset_id: unsw_nb15
    official_name: UNSW-NB15
    official_page: https://research.unsw.edu.au/projects/unsw-nb15-dataset
    source_type: mixed
    expected_size: "training/testing CSVs are moderate; complete PCAP set is roughly 100GB"
    download_method: manual
    priority: P1
    candidate_technique_codes: [TA43_01, TA43_02, TA01_02, TA03_01, TA11_01, TA11_02, TN01_01]
    label_source: official attack_cat, label, features and event-list files
    license_or_terms: review UNSW research dataset terms and attribution requirements
    safety_notes: use processed CSV first; do not default-download full PCAP collection
    download_status: metadata_only
    local_path: datasets/public/unsw_nb15
    notes: Reconnaissance and Exploits are useful candidates; Analysis, Backdoors, Shellcode and Worms need boundary review.

  - dataset_id: ctu13
    official_name: CTU-13 Botnet Dataset
    official_page: https://www.stratosphereips.org/datasets-ctu13
    source_type: mixed
    expected_size: "scenario-dependent; selected botnet-only PCAPs are 5-60MB and labels are tens to hundreds of MB"
    download_method: direct
    priority: P0
    candidate_technique_codes: [TA11_02, TN01_01]
    label_source: scenario README and labeled binetflow files
    license_or_terms: CC BY 4.0 as stated by Stratosphere IPS; preserve citation metadata
    safety_notes: download PCAP, flow labels and README only; skip malware binaries and protected archives
    download_status: partial_downloaded
    local_path: datasets/public/ctu13
    notes: Scenario 1/MCFP Botnet-42 already exists. Coverage profile adds small botnet-only scenarios without executable samples.

  - dataset_id: stratosphere_mcf
    official_name: Stratosphere Malware Capture Facility
    official_page: https://www.stratosphereips.org/datasets-malware
    source_type: mixed
    expected_size: "varies by capture; many scenario directories contain multi-GB full captures"
    download_method: direct
    priority: P2
    candidate_technique_codes: [TA03_01, TA11_01, TA11_02]
    label_source: per-capture README and network-flow labels
    license_or_terms: review each capture's license and citation notes
    safety_notes: only PCAP, Zeek/flow labels, README and metadata; skipped_malware_binary for executable/password-protected sample archives
    download_status: catalogued
    local_path: datasets/public/stratosphere_mcf
    notes: Malware-family traffic can support callback evaluation; installation and backdoor access remain manual-review labels.

  - dataset_id: iot23
    official_name: IoT-23
    official_page: https://www.stratosphereips.org/datasets-iot23
    source_type: mixed
    expected_size: "labeled-flow variants are preferred; full captures are multi-GB"
    download_method: direct
    priority: P1
    candidate_technique_codes: [TA43_01, TA11_02, TN01_01]
    label_source: official scenario metadata and labeled Zeek conn logs
    license_or_terms: CC BY 4.0 as stated by Stratosphere IPS; preserve citation metadata
    safety_notes: download network traces and labels only; no malware samples
    download_status: metadata_only
    local_path: datasets/public/iot23
    notes: Begin with small/labeled-flow archives and three benign IoT captures; full PCAP remains opt-in.

  - dataset_id: bot_iot
    official_name: BoT-IoT
    official_page: https://research.unsw.edu.au/projects/bot-iot-dataset
    source_type: mixed
    expected_size: "full PCAP about 69GB; 5% CSV/Argus subset is substantially smaller"
    download_method: manual
    priority: P1
    candidate_technique_codes: [TA43_01, TA43_02, TA11_02, TN01_01]
    label_source: official category/subcategory columns and dataset documentation
    license_or_terms: review UNSW research dataset terms and attribution requirements
    safety_notes: never default-download the 69GB PCAP; prefer 5% processed subset
    download_status: metadata_only
    local_path: datasets/public/bot_iot
    notes: OS Scan is a port-scan candidate; Service Scan is only medium confidence for TA43_02.

  - dataset_id: ton_iot_family
    official_name: ToN-IoT / NF-ToN-IoT / CIC-ToN-IoT
    official_page: https://research.unsw.edu.au/projects/toniot-datasets
    source_type: flow_csv
    expected_size: "processed/NF variants range from hundreds of MB to several GB"
    download_method: manual
    priority: P1
    candidate_technique_codes: [TA43_01, TA01_02, TA11_02, TN01_01]
    label_source: official type/label fields; derived variants must retain provenance
    license_or_terms: review ToN-IoT terms and the terms of each derived repository
    safety_notes: prefer processed network CSV; do not treat telemetry records as PCAP sessions
    download_status: metadata_only
    local_path: datasets/public/ton_iot
    notes: Scanning and web attacks are useful; generic malware traffic is not automatically a callback label.

  - dataset_id: cic_iot2023
    official_name: CICIoT2023
    official_page: https://www.unb.ca/cic/datasets/iotdataset-2023.html
    source_type: mixed
    expected_size: "full corpus is large; per-attack CSV and small samples are preferred"
    download_method: manual
    priority: P1
    candidate_technique_codes: [TA43_01, TA01_01, TA01_02, TA11_02, TN01_01]
    label_source: official attack categories and CSV labels
    license_or_terms: review UNB/CIC terms and citation instructions
    safety_notes: select CSV or small trace slices; avoid bulk capture download by default
    download_status: metadata_only
    local_path: datasets/public/cic_iot2023
    notes: Recon, Brute Force, Web-based and Mirai categories are candidates; label-to-technique boundaries still require review.

  - dataset_id: malware_traffic_analysis
    official_name: Malware-Traffic-Analysis.net exercises
    official_page: https://www.malware-traffic-analysis.net/
    source_type: pcap
    expected_size: "individual exercises are usually small to moderate; no bulk mirroring planned"
    download_method: manual
    priority: P2
    candidate_technique_codes: [TA11_02]
    label_source: exercise narrative and answer page, verified manually per PCAP
    license_or_terms: follow site usage terms; do not redistribute without confirmation
    safety_notes: PCAP-only allowlist; never download or extract malware sample archives or password-protected binaries
    download_status: manual_required
    local_path: datasets/public/malware_traffic_analysis
    notes: Manual validation corpus only, not automatically labeled training data.
